version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 4
    commit-message:
      prefix: "fix"
      include: "scope"
    groups:
      bundler-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      bundler-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 4
    commit-message:
      prefix: "fix"
      include: "scope"
    groups:
      actions-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      actions-major:
        patterns:
          - "*"
        update-types:
          - "major"
